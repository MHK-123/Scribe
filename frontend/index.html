<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/scribe-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Scribe VC Manager — The premium Discord study & voice management gateway." />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Scribe VC Manager" />
    <meta property="og:description" content="Manage your Discord realm's voice chambers with high-fidelity analytics and premium tools." />
    <meta property="og:image" content="/banner.png" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Scribe VC Manager" />
    <meta property="twitter:description" content="The ultimate Discord voice management sanctum." />
    <meta property="twitter:image" content="/banner.png" />

    <title>Scribe VC Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <style>
        .initial-load {
          position: fixed;
          inset: 0;
          background: #020205;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 20px;
          z-index: 9999;
          font-family: 'Rajdhani', sans-serif;
          color: white;
        }
        .pulse-ring {
          width: 60px;
          height: 60px;
          border: 2px solid #3b82f6;
          border-radius: 50%;
          animation: pulse 2s infinite;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .pulse-core {
          width: 10px;
          height: 10px;
          background: #3b82f6;
          border-radius: 50%;
          box-shadow: 0 0 20px #3b82f6;
        }
        @keyframes pulse {
          0% { transform: scale(0.8); opacity: 0.5; box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
          50% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); }
          100% { transform: scale(0.8); opacity: 0.5; box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
        .load-text {
          font-weight: 700;
          letter-spacing: 0.5em;
          text-transform: uppercase;
          font-size: 10px;
          color: rgba(255,255,255,0.4);
          animation: blink 1.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
      </style>
      <div class="initial-load">
        <div class="pulse-ring"><div class="pulse-core"></div></div>
        <div class="load-text">Initializing Sanctum</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
